<style>
#erd svg { width: 100% !important; }
</style>
<div id="erd" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS {
    int id PK
    string username
    string email
    string hashed_password
    enum role
    int store_id
    bool is_active
    datetime created_at
  }
  PRODUCTS {
    int id PK
    string name
    string sku
    enum category
    float unit_price
    int reorder_level
    datetime created_at
  }
  BATCHES {
    int id PK
    int product_id FK
    int store_id
    string batch_number
    int quantity
    date expiry_date
    float purchase_price
    datetime created_at
  }
  STOCK_MOVEMENTS {
    int id PK
    int product_id FK
    int store_id
    int batch_id FK
    string movement_type
    int quantity_change
    string note
    int created_by FK
    datetime created_at
  }
  INVOICES {
    int id PK
    string invoice_number
    int store_id
    enum sale_type
    string customer_name
    string prescription_ref
    enum payment_method
    float subtotal
    float discount
    float total
    int created_by FK
    datetime created_at
  }
  INVOICE_ITEMS {
    int id PK
    int invoice_id FK
    int product_id
    string product_name
    int batch_id
    int quantity
    float unit_price
    float line_total
  }
  PRODUCTS ||--o{ BATCHES : "has batches"
  PRODUCTS ||--o{ STOCK_MOVEMENTS : "tracked by"
  BATCHES ||--o{ STOCK_MOVEMENTS : "recorded in"
  INVOICES ||--o{ INVOICE_ITEMS : "contains"
  USERS ||--o{ INVOICES : "creates"
  USERS ||--o{ STOCK_MOVEMENTS : "performs"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
